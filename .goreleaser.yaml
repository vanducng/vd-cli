version: 2

# GoReleaser config for the vd CLI (vanducng/vd-cli).
# Tags are plain semver (v1.2.3).

project_name: vd

before:
  hooks:
    - go mod tidy

builds:
  - id: vd
    main: ./cmd/vd
    binary: vd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/vanducng/vd-cli/v2/internal/version.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # No Windows/arm64 support in v1
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{.ShortCommit}}"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: "^feat[(\\w)]*!?:"
      order: 0
    - title: Bug Fixes
      regexp: "^fix[(\\w)]*!?:"
      order: 1
    - title: Performance
      regexp: "^perf[(\\w)]*!?:"
      order: 2
    - title: Refactoring
      regexp: "^refactor[(\\w)]*!?:"
      order: 3
    - title: Other Changes
      order: 999
  filters:
    exclude:
      - "^chore\\(skills\\)"
      - "^chore:"
      - "^docs:"

release:
  # Tags matching v*-rc* / v*-alpha* become pre-releases automatically
  prerelease: auto

# Homebrew tap publication. Requires HOMEBREW_TAP_GITHUB_TOKEN secret
# (PAT with repo scope on vanducng/homebrew-tap) supplied to the
# release workflow's env.
brews:
  - name: vd
    repository:
      owner: vanducng
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/vanducng/vd-cli"
    description: "CLI for vendoring and syncing Claude Code skills"
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "vd"
    test: |
      system "#{bin}/vd", "--version"
