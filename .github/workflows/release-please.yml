name: Release Please

# Opens a release PR when conventional commits land on main.
# Merging the PR bumps CHANGELOG.md + manifest. This workflow then pushes
# the vX.Y.Z tag automatically, which triggers release.yml -> GoReleaser
# -> binaries + Homebrew formula publish.
#
# Why skip-github-release: release-please-action v5 hits a 403 "Resource
# not accessible by integration" on createRelease even with contents:write.
# Skipping that step bypasses the bug; GoReleaser creates the release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  push-tag:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push release tag
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists locally — nothing to push."
            exit 0
          fi
          git tag "${TAG}"
          git push origin "${TAG}"
